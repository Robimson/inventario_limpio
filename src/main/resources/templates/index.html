<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>UTEQ - Gestión Refactorizada</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tu CSS externo -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-5">
    <div class="container py-2">
        <span class="navbar-brand mb-0 h1">🎓 UTEQ - Sistema Limpio (AOP + MVC)</span>
    </div>
</nav>

<div class="container">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 class="mb-4 text-center" th:text="${prod.id == null ? '➕ Nuevo Registro' : '✏️ Actualizar Registro'}"></h5>
                <form th:action="@{/guardar}" th:object="${prod}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <input type="text" th:field="*{descripcion}" class="form-control">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Precio</label>
                            <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Stock</label>
                            <input type="number" th:field="*{stock}" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-uteq w-100 py-2 fw-bold">PROCESAR CAMBIOS</button>
                    <a th:if="${prod.id != null}" href="/" class="btn btn-light w-100 mt-2">Cancelar</a>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-4">
                <h5 class="mb-4">📋 Lista de Productos</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre / Descripción</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${lista}">
                            <td th:text="${p.id}"></td>
                            <td>
                                <span class="fw-bold" th:text="${p.nombre}"></span><br>
                                <small class="text-muted" th:text="${p.descripcion}"></small>
                            </td>
                            <td th:text="'$' + ${p.precio}"></td>
                            <td>
                                    <span th:class="${p.stock < 10 ? 'badge bg-danger' : 'badge bg-success'}"
                                          th:text="${p.stock}"></span>
                            </td>
                            <td>
                                <a th:href="@{'/editar/' + ${p.id}}" class="btn btn-sm btn-outline-warning">Editar</a>
                                <a th:href="@{'/eliminar/' + ${p.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar?')">Borrar</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
